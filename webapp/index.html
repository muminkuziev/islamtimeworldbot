<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#080D1A"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Islam Time World</title>

  <!-- Safe area insets: must run before any layout -->
  <script src="js/safe-area.js?v=116"></script>

  <!-- Telegram WebApp SDK (no-op when not in Telegram) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Fonts: Inter + Amiri (Arabic) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css?v=115"/>
</head>
<body>

  <div id="app">
    <div id="screen-splash"    class="screen"></div>
    <div id="screen-language"  class="screen"></div>
    <div id="screen-mazhab"    class="screen"></div>
    <div id="screen-location"  class="screen"></div>
    <div id="screen-dashboard" class="screen"></div>
    <div id="screen-prayer"    class="screen"></div>
    <div id="screen-qibla"     class="screen"></div>
    <div id="screen-mosques"   class="screen"></div>
    <div id="screen-quran"     class="screen"></div>
    <div id="screen-hadith"    class="screen"></div>
    <div id="screen-duas"      class="screen"></div>
    <div id="screen-dhikr"     class="screen"></div>
    <div id="screen-calendar"  class="screen"></div>
    <div id="screen-names"     class="screen"></div>
    <div id="screen-settings"  class="screen"></div>
  </div>

  <!-- i18n: must load before all screen modules -->
  <script src="js/i18n.js?v=118"></script>

  <!-- Static data -->
  <script src="data/names_of_allah.js?v=118"></script>
  <script src="data/duas.js?v=94"></script>

  <!-- Shared utilities -->
  <script src="js/hijri.js?v=98"></script>

  <!-- Capacitor native bridge — loaded FIRST so GPS helper is ready for all screens -->
  <script src="js/native/bridge.js?v=116"></script>

  <!-- Screen modules -->
  <script src="js/screens/splash.js?v=94"></script>
  <script src="js/screens/language.js?v=117"></script>
  <script src="js/screens/mazhab.js?v=104"></script>
  <script src="js/screens/location.js?v=117"></script>
  <script src="js/screens/prayer.js?v=110"></script>
  <script src="js/screens/qibla.js?v=94"></script>
  <script src="js/screens/mosques.js?v=118"></script>
  <script src="js/screens/quran.js?v=94"></script>
  <script src="js/screens/hadith.js?v=117"></script>
  <script src="js/screens/duas.js?v=117"></script>
  <script src="js/screens/dhikr.js?v=117"></script>
  <script src="js/screens/calendar.js?v=117"></script>
  <script src="js/screens/names.js?v=94"></script>
  <script src="js/screens/settings.js?v=104"></script>
  <script src="js/screens/dashboard.js?v=117"></script>

  <!-- App controller -->
  <script src="js/app.js?v=117"></script>

  <!-- Provider architectures (Quran + Hadith) -->
  <script src="js/native/quran-provider.js?v=104"></script>
  <script src="js/native/hadith-provider.js?v=104"></script>

  <!-- Service Worker: only in browser (Telegram WebApp). Disabled in native Capacitor app
       because SW intercepts requests and fetches from real server instead of local assets. -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var cap = window.Capacitor;
      if (cap && cap.isNativePlatform && cap.isNativePlatform()) {
        /* Native app: unregister any stale SW left from previous installs */
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
        return;
      }
      /* Browser / Telegram WebApp: register SW for offline support */
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .catch(function (e) { console.warn('[SW] register failed:', e); });
      });
    })();
  </script>

</body>
</html>
