<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C84A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow background -->
  <circle cx="100" cy="100" r="95" fill="url(#glowBg)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="80" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- Mosque body -->
  <rect x="46" y="108" width="108" height="48" rx="4" fill="url(#goldGrad)"/>

  <!-- Mosque main dome -->
  <path d="M100 58 C78 58 58 76 58 100 L142 100 C142 76 122 58 100 58Z" fill="url(#goldGrad)"/>

  <!-- Left minaret -->
  <rect x="30" y="82" width="18" height="74" rx="3" fill="url(#goldGrad)"/>
  <path d="M39 82 C39 72 30 68 39 63 C48 68 48 72 39 82Z" fill="url(#goldGrad)"/>
  <rect x="33" y="130" width="12" height="4" rx="1" fill="#141E35" opacity="0.4"/>

  <!-- Right minaret -->
  <rect x="152" y="82" width="18" height="74" rx="3" fill="url(#goldGrad)"/>
  <path d="M161 82 C161 72 152 68 161 63 C170 68 170 72 161 82Z" fill="url(#goldGrad)"/>
  <rect x="155" y="130" width="12" height="4" rx="1" fill="#141E35" opacity="0.4"/>

  <!-- Main entrance arch -->
  <path d="M85 156 L85 128 Q100 115 115 128 L115 156Z" fill="#141E35" opacity="0.85"/>

  <!-- Windows on body -->
  <path d="M64 130 Q72 122 80 130 L80 140 L64 140Z" fill="#141E35" opacity="0.5"/>
  <path d="M120 130 Q128 122 136 130 L136 140 L120 140Z" fill="#141E35" opacity="0.5"/>

  <!-- Crescent moon on dome tip -->
  <g filter="url(#glow)" transform="translate(100, 52)">
    <path d="M0 -16 C-10 -16 -18 -8 -18 2 C-18 12 -10 20 0 20 C-5 14 -8 8 -8 2 C-8 -4 -5 -10 0 -16Z" fill="#F0C84A"/>
    <path d="M0 -16 C10 -16 18 -8 18 2 C18 12 10 20 0 20 C5 14 8 8 8 2 C8 -4 5 -10 0 -16Z" fill="#F0C84A" opacity="0.3"/>
  </g>

  <!-- Star next to crescent -->
  <g filter="url(#glow)" transform="translate(118, 42) rotate(15)">
    <polygon points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#F0C84A"/>
  </g>
</svg>
