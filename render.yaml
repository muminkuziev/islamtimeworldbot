services:
  - type: web
    name: islamtimeworldbot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    disk:
      name: islamtimeworldbot-data
      mountPath: /app/persist
      sizeGB: 1
    envVars:
      # ── Required: set these in Render Dashboard → Environment ──
      - key: BOT_TOKEN
        sync: false

      - key: WEBAPP_URL
        value: "https://islamtimeworldbot-dbup.onrender.com"

      - key: PYTHONIOENCODING
        value: "utf-8"

      - key: ADMIN_IDS
        sync: false